name: $(BuildID)_$(BuildDefinitionName)_$(SourceBranchName)_$(Date:yyyyMMdd)$(Rev:.r)

# NOTE: This pipeline was migrated off the internal csdkcontainerregistry
# container images and the self-hosted 'sdk-c--*' agent pools (which are no
# longer available) onto Microsoft-hosted vmImage agents, mirroring the
# structural fixes applied to azure-iot-sdk-c/build/.vsts-ci.yml.
# c-utility has no E2E tests (only unit tests), so the IoT Hub / DPS secret
# env blocks that used to be plumbed into every job have been removed.

resources:
  - repo: self
    clean: true

jobs:
- job: checksubmodule
  variables:
    CodeQL.Enabled: false
  pool:
    vmImage: 'ubuntu-24.04'
  displayName: 'Check Submodules'
  steps:
  - checkout: self
    submodules: recursive
  - script: |
      sudo apt-get update && sudo apt-get install -y \
      curl \
      git \
      build-essential \
      pkg-config
      sudo curl -sL https://deb.nodesource.com/setup_16.x | bash -
      sudo apt-get install -y nodejs
    displayName: 'Setup'
  - script: |
      npm install check_submodules
      node_modules/.bin/check_submodules . master
    displayName: 'Check Submodules Match'

- job: windowsx86
  timeoutInMinutes: 90
  pool:
    vmImage: 'windows-2022'
  displayName: 'Windows x86'
  steps:
  - checkout: self
    submodules: true
  - script: |
      call jenkins\windows_c.cmd
    displayName: 'Build'
  - script: |
      call jenkins\windows_c_VsDevCmd.cmd x86 && cd cmake && ctest -T test --no-compress-output -C Debug -V -j 16 --schedule-random
    displayName: 'Run Tests'
  - task: PublishTestResults@2
    displayName: 'Publish Windows x86 Results'
    inputs:
      testRunner: CTest
      testResultsFiles: '**/Test.xml'
      mergeTestResults: true
      testRunTitle: 'windowsx86'
    condition: succeededOrFailed()
  - task: ComponentGovernanceComponentDetection@0
    displayName: 'Component Detection'

- job: windowsx64
  timeoutInMinutes: 90
  variables:
    CodeQL.Enabled: $[eq(variables['Build.SourceBranch'], 'refs/heads/master')]
    CodeQL.Language: cpp
  pool:
    vmImage: 'windows-2022'
  displayName: 'Windows x64'
  steps:
  - checkout: self
    submodules: true
  - task: CodeQL3000Init@0
  - script: |
      call jenkins\windows_c.cmd --platform x64
    displayName: 'Build'
  - task: CodeQL3000Finalize@0
    condition: always()
  - script: |
      call jenkins\windows_c_VsDevCmd.cmd x64 && cd cmake && ctest -T test --no-compress-output -C Debug -V -j 16 --schedule-random
    displayName: 'Run Tests'
  - task: PublishTestResults@2
    displayName: 'Publish Windows x64 Results'
    inputs:
      testRunner: CTest
      testResultsFiles: '**/Test.xml'
      mergeTestResults: true
      testRunTitle: 'windowsx64'
    condition: succeededOrFailed()
  - task: ComponentGovernanceComponentDetection@0
    displayName: 'Component Detection'

- job: windowsdynamic
  timeoutInMinutes: 90
  pool:
    vmImage: 'windows-2022'
  displayName: 'Windows Dynamic'
  steps:
  - checkout: self
    submodules: true
  - script: |
      call jenkins\windows_c_VsDevCmd.cmd && call jenkins\windows_c_build_as_dynamic.cmd
    displayName: 'Build'
  - task: ComponentGovernanceComponentDetection@0
    displayName: 'Component Detection'

- job: clang
  timeoutInMinutes: 90
  pool:
    vmImage: 'ubuntu-24.04'
  displayName: 'Linux Ubuntu Clang'
  steps:
  - checkout: self
    submodules: true
  - script: |
      set -e
      sudo apt-get update
      sudo apt-get install -y \
        clang \
        cmake \
        build-essential \
        pkg-config \
        curl \
        libcurl4-openssl-dev \
        libssl-dev \
        uuid-dev
    displayName: 'Host setup'
  - script: |
      export OPENSSL_ia32cap=0x00000000
      sudo chmod -R 755 .
      sudo -E ./jenkins/ubuntu_clang.sh
    displayName: 'Build'
  - script: |
      cd cmake && sudo -E ../build_all/linux/run_tests.sh
    displayName: 'Run Tests'
  - task: PublishTestResults@2
    displayName: 'Publish Clang Results'
    inputs:
      testRunner: CTest
      testResultsFiles: '**/Test.xml'
      mergeTestResults: true
      testRunTitle: 'clang'
    condition: succeededOrFailed()

