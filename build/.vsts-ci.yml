- job: linux_mbed
  # Ubuntu 24.04 ships mbedTLS 3.x via libmbedtls-dev, but adapters/tlsio_mbedtls.c
  # in this repo targets the mbedTLS 2.x API (e.g. mbedtls_ssl_get_max_out_record_payload).
  # Install mbedTLS 2.28 (LTS) from source so the link step resolves, mirroring
  # the mbedtls_2_28 job in azure-iot-sdk-c.
  timeoutInMinutes: 60
  pool:
    vmImage: 'ubuntu-24.04'
  displayName: 'mbedTLS'
  steps:
  - checkout: self
    submodules: true
  - script: |
      set -e
      # The Microsoft-hosted ubuntu-24.04 image preinstalls libmbedtls-dev,
      # which on 24.04 is mbedTLS 3.x. The unit test relies on umock-c
      # parsing <mbedtls/ssl.h> to auto-mock mbedTLS symbols used by
      # adapters/tlsio_mbedtls.c (e.g. mbedtls_ssl_get_max_out_record_payload),
      # but that function does not exist in 3.x's headers, so it is left as
      # an undefined external at link time. Purge the system mbedTLS so the
      # 2.28 install under /usr/local is the only one CMake can find.
      sudo apt-get update
      sudo apt-get purge -y 'libmbedtls*' 'libmbedcrypto*' 'libmbedx509*' || true
      sudo apt-get install -y \
        clang \
        cmake \
        build-essential \
        pkg-config \
        curl \
        libcurl4-openssl-dev \
        uuid-dev
    displayName: 'Host setup'
  - script: |
      set -e
      git clone --depth 1 -b mbedtls-2.28.10 https://github.com/Mbed-TLS/mbedtls /tmp/mbedtls-2.28
      cd /tmp/mbedtls-2.28
      mkdir build && cd build
      cmake -DUSE_SHARED_MBEDTLS_LIBRARY=ON -DCMAKE_INSTALL_PREFIX=/usr/local ..
      make -j$(nproc)
      sudo make install
      sudo ldconfig
    displayName: 'Install mbedTLS 2.28'
  - script: |
      chmod +x jenkins/linux_mbed_clang_buildonly.sh
      ./jenkins/linux_mbed_clang_buildonly.sh
    displayName: 'Clang Build'
    env:
      LD_LIBRARY_PATH: /usr/local/lib
  - script: |
      sudo chmod 755 jenkins/linux_mbed.sh
      sudo -E ./jenkins/linux_mbed.sh
    displayName: 'Build'
    env:
      LD_LIBRARY_PATH: /usr/local/lib

